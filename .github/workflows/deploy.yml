name: Deploy to Fly.io

on:
  push:
    branches:
      - main
      - create
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy (local builder)
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2; do
            echo "Local deploy attempt ${attempt}/2"
            if flyctl deploy --local-only; then
              echo "Local deploy succeeded"
              exit 0
            fi

            if [ "$attempt" -lt 2 ]; then
              wait_seconds=20
              echo "Local deploy failed. Retrying in ${wait_seconds}s..."
              sleep "$wait_seconds"
            fi
          done

          echo "Local deploy failed after retries"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
