name: Deploy to Fly.io

on:
  push:
    branches:
      - main
      - create
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy with retry and fallback
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Remote deploy attempt ${attempt}/3"
            if flyctl deploy --remote-only; then
              echo "Remote deploy succeeded"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              wait_seconds=$((attempt * 30))
              echo "Remote builder unavailable. Retrying in ${wait_seconds}s..."
              sleep "$wait_seconds"
            fi
          done

          echo "Remote builder still unavailable. Falling back to local build deploy..."
          flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
